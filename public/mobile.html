<!DOCTYPE html>
<html>
<head>
  <title>CCV Mobile Stock Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --ccv-yellow: #EEB111;
      --ccv-burgundy: #98132F;
      --text: #222;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, var(--ccv-burgundy), #5f0c1d);
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      border-top: 8px solid var(--ccv-yellow);
    }

    h2 {
      margin-top: 0;
      color: var(--ccv-burgundy);
      font-size: 28px;
      text-align: center;
    }

    label {
      font-weight: bold;
      color: var(--text);
      margin-top: 16px;
      display: block;
    }

    input, button, select {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 18px;
      box-sizing: border-box;
      border-radius: 12px;
    }

    input, select {
      border: 2px solid #ddd;
    }

    button {
      background: var(--ccv-burgundy);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #scanBtn {
      background: #222;
    }

    #takePhotoBtn {
      background: var(--ccv-yellow);
      color: #222;
    }

    #status {
      font-weight: bold;
      color: var(--ccv-burgundy);
      margin-top: 18px;
      text-align: center;
    }

    img {
      width: 100%;
      margin-top: 15px;
      border-radius: 14px;
      border: 3px solid var(--ccv-yellow);
    }

    #reader {
      position: relative;
      width: 100%;
      margin-top: 15px;
      display: none;
      overflow: hidden;
      border-radius: 14px;
      border: 3px solid var(--ccv-yellow);
      background: black;
    }

    #appScreen {
      display: none;
    }
  </style>
</head>

<body>

  <div id="loginScreen" class="card">
    <h2>Store Login</h2>

    <label>Store</label>
    <select id="loginStoreId">
      <option value="palmerston-north">Palmerston North</option>
      <option value="new-plymouth">New Plymouth</option>
      <option value="wanganui">Wanganui</option>
<option value="hamilton-central">Hamilton Central</option>
<option value="hamilton-east">Hamilton East</option>
    </select>

    <label>Password</label>
    <input id="loginPassword" type="password" placeholder="Enter store password">

    <button id="loginBtn" type="button">Login</button>

    <p id="loginStatus"></p>
  </div>

  <div id="appScreen" class="card">
    <h2>CCV Stock Capture</h2>

    <p id="storeDisplay" style="font-weight:bold; text-align:center;"></p>

    <button id="logoutBtn" type="button">Change Store</button>

<label>Stock Code</label>
<input id="stockCode" placeholder="Example: A18108199-1">

<label>Photo Type</label>
<select id="photoType">
  <option value="Pulled Pawns">Pulled Pawns</option>
  <option value="Bought On Hold">Bought On Hold</option>
  <option value="$1 Reserve">$1 Reserve</option>
  <option value="Floorstock">Floorstock</option>
</select>

<button id="scanBtn" type="button">Scan Stock Code</button>

    <div id="reader"></div>

    <input
      id="photoInput"
      type="file"
      accept="image/*"
      capture="environment"
      multiple
      style="display:none;"
    >

    <button id="takePhotoBtn" type="button">Take Photos</button>
    <button id="uploadBtn" type="button">Upload Photos</button>

    <p id="status"></p>
    <img id="preview" style="display:none;">
  </div>

<script>
let scanner = null;

const loginScreen = document.getElementById("loginScreen");
const appScreen = document.getElementById("appScreen");

const loginStoreId = document.getElementById("loginStoreId");
const loginPassword = document.getElementById("loginPassword");
const loginStatus = document.getElementById("loginStatus");
const storeDisplay = document.getElementById("storeDisplay");

const stockCode = document.getElementById("stockCode");
const photoType = document.getElementById("photoType");
const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const reader = document.getElementById("reader");
const takePhotoBtn = document.getElementById("takePhotoBtn");

function showApp() {
  const storeId = localStorage.getItem("storeId");

  if (storeId) {
    loginScreen.style.display = "none";
    appScreen.style.display = "block";
    storeDisplay.textContent = "Logged in store: " + storeId;
  } else {
    loginScreen.style.display = "block";
    appScreen.style.display = "none";
  }
}

document.getElementById("loginBtn").addEventListener("click", async () => {

  loginStatus.textContent = "Logging in...";

  try {
    const response = await fetch("/store-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        storeId: loginStoreId.value,
        storePassword: loginPassword.value.trim()
      })
    });

    const data = await response.json();

    if (!data.success) {
      loginStatus.textContent = "Incorrect store password";
      return;
    }

    localStorage.setItem("storeId", data.storeId);
    localStorage.setItem("storePassword", loginPassword.value.trim());
    localStorage.setItem("storeName", data.storeName);

    loginPassword.value = "";
    showApp();

  } catch (error) {
    console.error(error);
    loginStatus.textContent = "Login failed";
  }
});

document.getElementById("logoutBtn").addEventListener("click", () => {

  localStorage.removeItem("storeId");
  localStorage.removeItem("storePassword");
  localStorage.removeItem("storeName");

  loginPassword.value = "";
  loginStatus.textContent = "";

  loginScreen.style.display = "block";
  appScreen.style.display = "none";
});

showApp();

async function stopScanner() {
  if (scanner) {
    try {
      await scanner.stop();
      await scanner.clear();
    } catch (error) {
      console.log("Scanner already stopped");
    }

    scanner = null;
  }

  reader.style.display = "none";
}

takePhotoBtn.addEventListener("click", async () => {
  await stopScanner();
  photoInput.click();
});

photoInput.addEventListener("change", () => {
  const file = photoInput.files[0];
  if (!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  statusText.textContent = `${photoInput.files.length} photo(s) selected`;
});

document.getElementById("scanBtn").addEventListener("click", async () => {
  try {
    reader.style.display = "block";
    reader.innerHTML = "";

    statusText.textContent = "Starting scanner...";

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      async (decodedText) => {
        stockCode.value = decodedText;
        statusText.textContent = "Scanned: " + decodedText;

        await stopScanner();
      }
    );

  } catch (error) {
    console.error(error);
    statusText.textContent = "Scanner failed: " + error;
  }
});

document.getElementById("uploadBtn").addEventListener("click", async () => {
  const code = stockCode.value.trim();

  const storeId = localStorage.getItem("storeId");
  const storePassword = localStorage.getItem("storePassword");

  if (!storeId || !storePassword) {
    alert("Please login first");
    showApp();
    return;
  }

  if (!code) {
    alert("Enter or scan stock code first");
    return;
  }

  if (photoInput.files.length === 0) {
    alert("Take photo(s) first");
    return;
  }

  const formData = new FormData();

alert("Photo type selected: " + photoType.value);

  Array.from(photoInput.files).forEach(file => {
    formData.append("photos", file);
  });

formData.append("stockCode", code);
formData.append("storeId", storeId);
formData.append("storePassword", storePassword);
formData.append("photoType", photoType.value);

  statusText.textContent = "Uploading photos...";

  try {
    const response = await fetch("/mobile-upload", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (data.success) {
      statusText.textContent = "Saved to Dropbox: " + data.dropboxFolder;

      photoInput.value = "";
      preview.style.display = "none";
      stockCode.value = "";

      await stopScanner();
    } else {
      statusText.textContent = data.error || "Upload failed";
    }

  } catch (error) {
    console.error(error);
    statusText.textContent = "Upload failed";
  }
});
</script>

</body>
</html>
